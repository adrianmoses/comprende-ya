# Self-host deployment (033 — deployment readiness).
#
# One command brings up the full product: api + webapp + postgres.
#   docker compose up --build
#
# Secrets/config come from a sibling `.env` file (see .env.example). The two
# *public origin* values are the critical contract:
#   - PUBLIC_API_URL   — the API origin reachable FROM THE USER'S BROWSER. Baked
#                        into the webapp at build time (VITE_API_BASE_URL). NOT
#                        the internal compose name `http://api:8000`.
#   - ALLOWED_ORIGINS  — the webapp origin(s) the API accepts CORS from.
# Behind a reverse proxy / TLS these become your real https:// origins.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-comprende_ya}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-comprende_ya}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Point the app at the compose Postgres (internal network name `db`).
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-comprende_ya}
    volumes:
      # Persist learner recordings (021) across container restarts/redeploys.
      - recordings:/app/recordings
    ports:
      - "8000:8000"

  webapp:
    build:
      context: ./webapp
      args:
        # Build-time, browser-reachable API origin (see note above).
        VITE_API_BASE_URL: ${PUBLIC_API_URL}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  recordings:
