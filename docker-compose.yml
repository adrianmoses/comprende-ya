services:
  age:
    image: apache/age
    container_name: comprende-ya-age
    environment:
      POSTGRES_USER: comprende
      POSTGRES_PASSWORD: comprende_dev
      POSTGRES_DB: comprende_ya
    ports:
      - "5455:5432"
    volumes:
      - age_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comprende -d comprende_ya"]
      interval: 5s
      timeout: 5s
      retries: 5

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: comprende-ya-llama
    ports:
      - "8081:8081"
    volumes:
      - ./models:/models
    command: >
      --model /models/${LLAMA_MODEL:-Llama-3.2-3B-Instruct-Q8_0.gguf}
      --ctx-size 2048
      --n-gpu-layers 99
      --port 8081
      --host 0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  age_data:
