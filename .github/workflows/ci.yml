name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --all-packages --no-install-workspace
      - run: uv run ruff check voice-agent/
      - run: uv run ruff format --check voice-agent/
      - run: uv run mypy voice-agent/ --ignore-missing-imports

  typescript-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: webapp
      - run: pnpm lint
        working-directory: webapp
      - run: pnpm tsc --noEmit
        working-directory: webapp

  import-check:
    name: Python Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --all-packages --no-install-workspace
      - run: uv run python -c "import fastapi; import numpy; import faster_whisper; print('Core imports OK')"
