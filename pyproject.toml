[project]
name = "comprende-ya"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.15.0",
    "anthropic>=0.72.0",
    "fastapi[standard]>=0.121.0",
    "google-api-python-client>=2.187.0",
    "isodate>=0.7.2",
    "openai>=2.7.1",
    "pip>=25.3",
    "prefect>=3.5.0",
    "psycopg2-binary>=2.9.10",
    "python-dotenv>=1.2.1",
    "python-multipart>=0.0.20",
    "spacy>=3.8.11",
    "sqlmodel>=0.0.27",
    "youtube-transcript-api>=1.2.3",
    "yt-dlp>=2025.10.22",
]

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=8.0",
    "ruff>=0.7",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["src"]

[tool.ruff]
target-version = "py312"
src = ["src", "tests"]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
# Long-form Spanish prompts are content, not code style. Wrapping them would
# rewrite the prompt the model sees and is not worth the trade-off here.
"src/services/questions.py" = ["E501"]
"src/services/dialect_classifier.py" = ["E501"]
"src/services/phrase_autopsy.py" = ["E501"]
"src/repositories/classifier_repository.py" = ["E501"]
# Auto-generated by Alembic — leave the original formatting intact.
"alembic/versions/*.py" = ["E501"]
